name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: pnpm install

      - name: Lint
        if: hashFiles('package.json') != ''
        run: pnpm run lint || true

      - name: Test
        if: hashFiles('package.json') != ''
        run: pnpm run test || true
